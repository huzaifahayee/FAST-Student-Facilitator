# FAST Student Facilitator (FSF)
# Spring Boot Configuration File (application.properties)
#
# What is this file?
# This file stores required properties and environment variables for the backend.
# The server port, database connections, and logging configurations are kept here.

# --- SERVER CONFIGURATION ---
# We will run the backend API on port 8080.
server.port=8080

# --- DATABASE CONNECTION (PostgreSQL) ---
# When your PostgreSQL installation completes, you'll need to specify your password here.
# Data source URL points to the local database named "fsf_db"
spring.datasource.url=jdbc:postgresql://localhost:5432/fsf_db
# Default PostgreSQL username is usually 'postgres'
spring.datasource.username=postgres
# TODO: Replace 'YOUR_PASSWORD_HERE' with the password you set during installation
spring.datasource.password=huzaifahayee

# --- HIBERNATE / JPA CONFIGURATION ---
# What does this do?
# Hibernate is the tool that implements JPA (Java Persistence API).
# 'update' means Hibernate will automatically create or update database tables 
# based on our Java Entity classes. This is great for active development!
spring.jpa.hibernate.ddl-auto=update
# This prints the SQL queries to the console so you can see exactly what 
# the database is doing under the hood (excellent for learning!).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
