# FAST Student Facilitator (FSF)
# Spring Boot Configuration File (application.properties)
#
# What is this file?
# This file stores required properties and environment variables for the backend.
# The server port, database connections, and logging configurations are kept here.

# --- SERVER CONFIGURATION ---
# We will run the backend API on port 8080.
server.port=8080

# --- DATABASE CONNECTION (PostgreSQL) ---
# FSF always targets PostgreSQL on normal runs (default profile). Do not pass spring.profiles.active=h2
# unless you deliberately want the in-memory H2 profile instead.
#
# Override URL/user/password via env (SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME,
# SPRING_DATASOURCE_PASSWORD) or gitignored application-local.properties next to this file /
# backend/application-local.properties (see spring.config.import below).
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fsf_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.config.import=optional:file:./application-local.properties,optional:file:./backend/application-local.properties

# --- HIBERNATE / JPA CONFIGURATION ---
# What does this do?
# Hibernate is the tool that implements JPA (Java Persistence API).
# 'update' means Hibernate will automatically create or update database tables 
# based on our Java Entity classes. This is great for active development!
spring.jpa.hibernate.ddl-auto=update
# This prints the SQL queries to the console so you can see exactly what 
# the database is doing under the hood (excellent for learning!).
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# --- GOOGLE OAUTH2 ---
# Client ID from Google Cloud Console (matches frontend VITE_GOOGLE_CLIENT_ID)
app.google.client-id=531939840171-a6g361rlu4bf5ie5l695iafdvral542h.apps.googleusercontent.com
