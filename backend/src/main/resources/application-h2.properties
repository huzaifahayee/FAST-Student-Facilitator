# OPT-IN ONLY — not used unless you start with spring.profiles.active=h2 (e.g. CI without Postgres).
# Normal development always uses PostgreSQL from application.properties.
spring.datasource.url=jdbc:h2:mem:fsfdb;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
